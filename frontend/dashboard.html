<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Tableau de bord - TaskFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #F0F2F5;
        }

        .nav {
            background: #1E3A5F;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contenu {
            padding: 32px;
            max-width: 900px;
            margin: 0 auto;
        }

        .titre {
            font-size: 24px;
            color: #1E3A5F;
            margin-bottom: 24px;
        }

        .grille {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .carte {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .carte .nombre {
            font-size: 36px;
            font-weight: bold;
            color: #1E3A5F;
        }

        .carte .label {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .retard {
            color: #C62828 !important;
        }

        .taches-liste {
            margin-top: 32px;
        }

        .tache-item {
            background: white;
            padding: 14px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .haute {
            background: #FFEBEE;
            color: #C62828;
        }

        .moyenne {
            background: #FFF3E0;
            color: #E65100;
        }

        .basse {
            background: #E8F5E9;
            color: #1B5E20;
        }

        button {
            background: #EF5350;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="nav">
        <h1>TaskFlow</h1>
        <!-- CLOCHE NOTIFICATIONS -->
<div id="cloche" style="position:relative; cursor:pointer; margin-right:20px"
onclick="ouvrirNotifications()">
<span style="font-size:24px">&#128276;</span>
<span id="badge"
style="display:none; position:absolute; top:-5px; right:-8px;
background:#EF5350; color:white; border-radius:50%;
padding:2px 7px; font-size:11px; font-weight:bold">0</span>
</div>
<!-- PANNEAU NOTIFICATIONS -->
<div id="panneauNotifications"
style="display:none; position:absolute; top:60px; right:20px;
background:white; border-radius:10px; width:350px;
box-shadow:0 4px 20px rgba(0,0,0,0.15); z-index:100;
max-height:400px; overflow-y:auto">
<div style="padding:16px; border-bottom:1px solid #EEE;
display:flex; justify-content:space-between">
<strong style="color:#1E3A5F">Notifications</strong>
<button onclick="marquerToutesLues()"
style="background:none; border:none; color:#1E3A5F;
cursor:pointer; font-size:12px">
Tout marquer lu
</button>
</div>
<div id="listeNotifications" style="padding:8px">Chargement...</div>
</div>
        <button onclick="seDeconnecter()">Se deconnecter</button>
    </div>
    <div class="contenu">
        <h2 class="titre" id="bienvenue">Chargement...</h2>
        <div class="grille">
            <div class="carte">
                <div class="nombre" id="projetsActifs">-</div>
                <div class="label">Projets actifs</div>
            </div>
            <div class="carte">
                <div class="nombre" id="tachesAssignees">-</div>
                <div class="label">Taches assignees</div>
            </div>
            <div class="carte">
                <div class="nombre" id="tachesTerminees">-</div>
                <div class="label">Taches terminees</div>
            </div>
            <div class="carte">
                <div class="nombre retard" id="tachesEnRetard">-</div>
                <div class="label">Taches en retard</div>
            </div>
        </div>
        <div class="taches-liste">
            <h3 style="margin-bottom:12px; color:#1E3A5F">Taches en cours</h3>
            <div id="listeTaches">Chargement...</div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const API = 'http://localhost:3000/api';
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) window.location.href = 'index.html';
        document.getElementById('bienvenue').textContent =
            'Bonjour, ' + user.prenom + ' ' + user.nom + ' !';
        // UN SEUL appel Axios pour toutes les donnees
        axios.get('http://localhost:3000/api/dashboard', {
            headers: { Authorization: 'Bearer ' + token }
        })
            .then(function (reponse) {
                const data = reponse.data;
                document.getElementById('projetsActifs').textContent = data.projetsActifs;
                document.getElementById('tachesAssignees').textContent = data.tachesAssignees;
                document.getElementById('tachesTerminees').textContent = data.tachesTerminees;
                document.getElementById('tachesEnRetard').textContent = data.tachesEnRetard;
                const liste = document.getElementById('listeTaches');
                if (data.tachesEnCours.length === 0) {
                    liste.innerHTML = '<p style="color:#666">Aucune tache en cours.</p>';
                    return;
                }
                liste.innerHTML = data.tachesEnCours.map(function (tache) {
                    return '<div class="tache-item">' +
                        '<div><strong>' + tache.titre + '</strong>' +
                        '<span style="color:#666;font-size:12px;margin-left:8px">' +
                        (tache.projet ? tache.projet.titre : '') + '</span></div>' +
                        '<span class="badge ' + tache.priorite + '">' + tache.priorite + '</span>' +
                        '</div>';
                }).join('');
            })
            .catch(function () {
                document.getElementById('listeTaches').innerHTML =
                    '<p style="color:red">Erreur de chargement.</p>';
            });
        function seDeconnecter() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
        // POLLING NOTIFICATIONS toutes les 30 secondes
function chargerNotifications() {
 axios.get(API + '/notifications', {
 headers: { Authorization: 'Bearer ' + token }
 })
 .then(function(reponse) {
 const data = reponse.data;
 const badge = document.getElementById('badge');
  if (data.nonLues > 0) {
 badge.textContent = data.nonLues;
 badge.style.display = 'inline-block';
 } else {
 badge.style.display = 'none';
 }
  const liste = document.getElementById('listeNotifications');
 if (data.notifications.length === 0) {
 liste.innerHTML = '<p style="color:#666;padding:12px">Aucune notification.</p>';
 } else {
 liste.innerHTML = data.notifications.map(function(n) {
 const bg = n.lue ? '#FAFAFA' : '#E3F2FD';
 return '<div style="padding:12px;background:' + bg +
 ';border-radius:6px;margin-bottom:6px;cursor:pointer" ' +
 'onclick="marquerLue(\'' + n._id + '\')">' +
 '<p style="font-size:13px;color:#212121">' + n.message + '</p>' +
 '<p style="font-size:11px;color:#666;margin-top:4px">' +
 new Date(n.createdAt).toLocaleString('fr-FR') +
 '</p></div>';
 }).join('');
 }
 });
 }
  function ouvrirNotifications() {
 const panneau = document.getElementById('panneauNotifications');
 panneau.style.display = panneau.style.display === 'none' ? 'block' : 'none';
 }
  function marquerLue(id) {
 axios.patch(API + '/notifications/' + id + '/read', {}, {
 headers: { Authorization: 'Bearer ' + token }
 })
 .then(function() { chargerNotifications(); });
 }
  function marquerToutesLues() {
 axios.patch(API + '/notifications/read-all', {}, {
 headers: { Authorization: 'Bearer ' + token }
 })
 .then(function() { chargerNotifications(); });
 }
  // Charger au demarrage
 chargerNotifications();
  // POLLING toutes les 30 secondes
 setInterval(chargerNotifications, 30000);
    </script>
</body>

</html>
